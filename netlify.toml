[build]
  # Base directory for the build (root of monorepo)
  base = "/"
  
  # Build command - install dependencies, build shared package, then build frontend
  command = "npm install && npm run build --workspace=packages/shared && npm run build:frontend"
  
  # Directory with the static files to publish (relative to base)
  publish = "packages/frontend/dist"

[build.environment]
  # Node version
  NODE_VERSION = "18"
  
  # Environment variables for the build
  NODE_ENV = "production"

# Redirect all requests to index.html for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
